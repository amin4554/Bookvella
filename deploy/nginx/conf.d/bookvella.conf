# ─────────────────────────────────────────────
# HTTP — redirect all traffic to HTTPS
#        except the ACME challenge path (certbot)
# ─────────────────────────────────────────────
server {
    listen 80;
    server_name bookvella.com www.bookvella.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 80;
    server_name api.bookvella.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# ─────────────────────────────────────────────
# HTTPS — Web (Next.js on port 3001)
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name bookvella.com www.bookvella.com;

    ssl_certificate     /etc/letsencrypt/live/bookvella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/bookvella.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://web:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}

# ─────────────────────────────────────────────
# HTTPS — API (NestJS on port 3000)
# ─────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name api.bookvella.com;

    ssl_certificate     /etc/letsencrypt/live/api.bookvella.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.bookvella.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    client_max_body_size 20M;

    location / {
        proxy_pass         http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }
}
